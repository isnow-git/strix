name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Press D-pad …
        3. See error
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Android TV model & OS version
      placeholder: "TCL <model>, Android 11 (API 30)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Strix version / commit
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logcat / stack trace
      render: shell
