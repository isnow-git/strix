# Strix detekt overrides. buildUponDefaultConfig = true, so this only tweaks
# rules on top of detekt's defaults.

complexity:
  # @Composable functions are naturally long, branchy and take many parameters
  # (state + callbacks); the length/complexity rules don't fit them, so they're
  # scoped out — same rationale as FunctionNaming below.
  LongMethod:
    threshold: 80
    ignoreAnnotated: ['Composable']
  CyclomaticComplexMethod:
    ignoreAnnotated: ['Composable']
  LongParameterList:
    ignoreAnnotated: ['Composable']
  NestedBlockDepth:
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    active: false

style:
  MagicNumber:
    # Player/network tuning constants are inherently "magic"; keep them readable
    # in code rather than fighting the rule. Revisit per-module if it gets noisy.
    active: false
  ReturnCount:
    max: 4
  ThrowsCount:
    # HTTP guard + empty-body guard + parse guard is a normal shape for the network
    # clients; three throws in one function is fine.
    max: 3
  MaxLineLength:
    maxLineLength: 120

naming:
  FunctionNaming:
    # Composable functions are PascalCase by convention.
    ignoreAnnotated: ['Composable']
